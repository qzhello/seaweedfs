server:
  http_addr: ":8080"
  log_level: info

postgres:
  dsn: "postgres://tier:tier@localhost:5432/tiering?sslmode=disable"
  max_conns: 20

clickhouse:
  addr: ["localhost:9000"]
  database: tiering
  username: default
  password: ""

seaweed:
  master: "localhost:9333"
  filer: "localhost:8888"
  grpc_dial_timeout: 5s

scheduler:
  enabled: true
  scoring_cron: "0 * * * *"     # hourly
  execution_cron: "*/15 * * * *" # 15min
  cooldown_days: 14              # 同 volume 二次迁移最短间隔
  dry_run_global: false          # 紧急刹车

scoring:
  weights:
    last_access_decay: 0.40
    access_count_30d:  0.25
    object_size:       0.10
    is_readonly:       0.15
    quiet_for_days:    0.10
  thresholds:
    to_ec:      0.55   # >此分 → 转 EC
    to_cloud:   0.75   # >此分 → 上传冷云
    to_archive: 0.90

ai:
  provider: rule        # rule | openai | anthropic
  openai:
    api_key: ""
    model: "gpt-4o-mini"
    base_url: ""
  anthropic:
    api_key: ""
    model: "claude-haiku-4-5"
  request_timeout: 30s
  max_concurrency: 4

executor:
  parallel_limit: 4
  shell_path: ""        # 留空则用 gRPC; 否则 fallback 到 `weed shell -c ...`
  retain_local_dat: true # tier.upload 时保留本地 dat 一周,便于回滚
